<!DOCTYPE html>
<html>
<head>
    <title>Hospital Management System</title>

    <link rel="stylesheet" href="style.css">
    <style>
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        .card {
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.4);
        }

        .card h3 {
            margin-bottom: 15px;
            font-size: 18px;
            color: #1e2a38;
            font-weight: 600;
        }

        .card p {
            font-size: 32px;
            font-weight: bold;
            color: #007bff;
            background: -webkit-linear-gradient(#4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .card-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2 onclick="goTo('dashboard.html')">🏥 HMS</h2>

    <ul>
        <li onclick="goTo('dashboard.html')" class="active"><span>📊</span> Dashboard</li>
        <li onclick="goTo('add.html')"><span>➕</span> Add Patient</li>
        <li onclick="goTo('doctor.html')"><span>👨‍⚕️</span> Doctors</li>
        <li onclick="goTo('appointment.html')"><span>📅</span> Appointments</li>
        <li onclick="goTo('billing.html')"><span>💳</span> Billing</li>
    </ul>
</div>

<div class="main">

    <div class="header">DASHBOARD</div>

    <div class="cards">
        <div class="card glass" onclick="goTo('add.html')">
            <div class="card-icon">🛏️</div>
            <h3>Total Patients</h3>
            <p id="totalPatients">0</p>
        </div>

        <div class="card glass" onclick="goTo('doctor.html')">
            <div class="card-icon">👨‍⚕️</div>
            <h3>Total Doctors</h3>
            <p>5</p>
        </div>

        <div class="card glass" onclick="goTo('appointment.html')">
            <div class="card-icon">📅</div>
            <h3>Appointments Today</h3>
            <p id="todayAppointments">0</p>
        </div>

        <div class="card glass" onclick="goTo('billing.html')">
            <div class="card-icon">💰</div>
            <h3>Today's Revenue</h3>
            <p id="revenue">₹0</p>
        </div>
    </div>

</div>

<script>
function goTo(page) {
    window.location.href = page;
}

/* 🔹 Load Data */
let patients = JSON.parse(localStorage.getItem("patients")) || [];
let appointments = JSON.parse(localStorage.getItem("appointments")) || [];

/* 🔹 Total Patients */
document.getElementById("totalPatients").innerText = patients.length;

/* 🔹 Today's Date */
let today = new Date().toISOString().split("T")[0];

/* 🔹 Filter Today Appointments */
let todayAppointmentsList = appointments.filter(a => a.date === today);

/* 🔹 Appointments Count */
document.getElementById("todayAppointments").innerText = todayAppointmentsList.length;

/* 🔹 Revenue Calculation */
let revenue = todayAppointmentsList.length * 500;
document.getElementById("revenue").innerText = "₹" + revenue;

</script>

</body>
</html>
